services:
  # 1. FastAPI AI Service (Python)
  - type: web
    name: psams-ai-service
    env: python
    branch: finish-resources
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    healthCheckInterval: 300
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Must be set manually in Render Dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info

  # 2. Laravel Backend Service (PHP)
  - type: web
    name: psams-backend
    env: php
    branch: finish-resources
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan migrate --force
    startCommand: php -S 0.0.0.0:$PORT -t public
    healthCheckPath: /api/health
    healthCheckInterval: 300
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false  # Must be set manually - generate with: php artisan key:generate
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: psams-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: psams-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: psams-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: psams-db
          property: password
      - key: AI_SERVICE_URL
        value: https://psams-ai-service.onrender.com  # Cross-service URL
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  # 3. PostgreSQL Database (Free Tier)
  - name: psams-db
    databaseName: psams_db
    user: psams_user
    plan: free
